name: Run tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  windows-e2e:
    name: Windows e2e (Hyper-V)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run e2e tests
        run: .\winmake.ps1 localtest
        shell: pwsh
